<div class="card-agenda-select curso-pointer" (click)="selecionarAgenda(agenda.id)">
    <div class="icon-wrapper">
        <i class="fas fa-book fa-2x text-primary"></i>
    </div>
    
    <div class="text-center">
        <h4 class="mb-0 text-dark">{{agenda.nombre}}</h4>
        <span class="badge bg-secondary mt-2">{{agenda.rol}}</span>
    </div>
</div>
