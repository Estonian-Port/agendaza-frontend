<section class="container mt-5">
    <div class="row text-center mb-5">
        <h2 class="display-6 fw-bold">Seleccione una Agenda</h2>
        <p class="text-muted">Gestione sus eventos y catering desde aquí</p>
    </div>

    <div class="row justify-content-center g-4">
        <div *ngFor="let agenda of listaAgenda | orderAbmById" class="col-lg-3 col-md-4 col-sm-6">
            <app-card-agenda [agenda]="agenda"></app-card-agenda>
        </div>
    </div>
</section>
